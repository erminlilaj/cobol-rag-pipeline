<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COBOL RAG Pipeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Include marked.js for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">C</span>
                    <h2>COBOL RAG</h2>
                </div>
            </div>

            <div class="sidebar-content">
                <div class="accordion">
                    <!-- Inbox Explorer -->
                    <div class="accordion-item active">
                        <div class="accordion-header" onclick="toggleAccordion(this)">
                            <h3>Inbox Explorer</h3>
                            <span class="icon">&#9660;</span>
                        </div>
                        <div class="accordion-body">
                            <div class="tree-container" id="inbox-tree">
                                <!-- Tree populated via JS -->
                            </div>
                            <div class="actions mt-10">
                                <button id="btn-sync" class="btn primary-btn" onclick="syncSelected()">Sync Selected</button>
                                <button id="btn-refresh-inbox" class="btn secondary-btn" onclick="loadInbox()">Refresh</button>
                            </div>
                        </div>
                    </div>

                    <!-- Pipeline Management -->
                    <div class="accordion-item">
                        <div class="accordion-header" onclick="toggleAccordion(this)">
                            <h3>Pipeline Tools</h3>
                            <span class="icon">&#9658;</span>
                        </div>
                        <div class="accordion-body">
                            <div class="actions">
                                <button class="btn secondary-btn" onclick="fetchConfig()">View Config</button>
                                <button class="btn secondary-btn" onclick="fetchIndexInfo()">Index Info</button>
                                <button class="btn danger-btn" onclick="resetCollection()">Reset DB</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="sidebar-footer">
                <p>Status: <span id="status-indicator" class="status online">Online</span></p>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <h2>RAG Chat Assistant</h2>
                <button class="btn text-btn" onclick="resetChat()">Clear Chat</button>
            </header>

            <div class="chat-history" id="chat-history">
                <div class="message assistant">
                    <div class="avatar">AI</div>
                    <div class="content">Hello! I am the COBOL RAG Assistant. How can I help you analyze the codebase today?</div>
                </div>
            </div>

            <div class="chat-input-container">
                <textarea id="chat-input" placeholder="Ask a question about your COBOL code..." rows="1" onkeydown="handleEnter(event)"></textarea>
                <button id="send-btn" class="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </main>

        <!-- Modal Overlay -->
        <div id="modal" class="modal">
            <div class="modal-content glass">
                <span class="close-modal" onclick="closeModal()">&times;</span>
                <h2 id="modal-title">Modal Title</h2>
                <div id="modal-body" class="modal-body">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
